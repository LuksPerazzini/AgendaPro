<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary SEO -->
    <title>AgendaPro — Agendamentos Online para Profissionais Autônomos</title>
    <meta name="description" content="Crie seu perfil, compartilhe seu link e receba agendamentos automáticos. Barbeiros, eletricistas, personal trainers e mais. Grátis para começar." />
    <meta name="keywords" content="agendamento online, agenda para barbeiro, agendamento de serviços, freelancer agenda, agendamento whatsapp, agenda profissional" />
    <meta name="author" content="AgendaPro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://agendapro.com.br/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agendapro.com.br/" />
    <meta property="og:title" content="AgendaPro — Agendamentos Online para Profissionais" />
    <meta property="og:description" content="Receba agendamentos automáticos, reduza faltas e atraia mais clientes. Mais de 2.400 profissionais já usam." />
    <meta property="og:image" content="https://agendapro.com.br/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="AgendaPro" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://agendapro.com.br/" />
    <meta name="twitter:title" content="AgendaPro — Agendamentos Online para Profissionais" />
    <meta name="twitter:description" content="Crie seu link de agendamento e nunca mais perca cliente por falta de organização." />
    <meta name="twitter:image" content="https://agendapro.com.br/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AgendaPro" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AgendaPro",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Plataforma de agendamento online para profissionais autônomos e pequenos negócios",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "BRL"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "2400"
      }
    }
    </script>

    <style>
      html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
      #root { width: 100%; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
